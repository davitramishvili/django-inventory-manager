{% extends 'base.html' %}
{% block title %}Login — Inventory Manager{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-10 col-md-6 col-lg-4">

    <div class="text-center mb-4">
      <div class="display-6 fw-bold text-dark">
        <i class="bi bi-box-seam text-primary me-2"></i>Inventory Manager
      </div>
      <p class="text-muted mt-1">Sign in to your account</p>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4">
      <div class="card-body">

        {% if error %}
          <div class="alert alert-danger rounded-3 py-2 px-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid username or password.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <div class="mb-3">
            <label for="id_username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input
                type="text"
                id="id_username"
                name="username"
                class="form-control border-start-0 ps-0"
                placeholder="Enter username"
                autofocus
                required
              >
            </div>
          </div>

          <div class="mb-4">
            <label for="id_password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input
                type="password"
                id="id_password"
                name="password"
                class="form-control border-start-0 ps-0"
                placeholder="Enter password"
                required
              >
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </form>

      </div>
    </div>

    <p class="text-center text-muted mt-3 small">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>

  </div>
</div>
{% endblock %}
